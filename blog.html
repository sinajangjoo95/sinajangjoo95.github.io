  <style>
    :root {
      --text-main: #222222;
      --text-body: #333333;
      --text-muted: #5A5A5A;
      --heading-main: #111111;

      --accent-green: #123f36;
      --accent-gold: #b58b47;
      --accent-garnet: #782F40;
      --accent-slate: #4A5C61;

      --box-bg: #ffffff;
      --soft-bg: #FAF8F4;
      --soft-chip: #F1ECE4;
      --soft-border: rgba(0, 0, 0, 0.10);
      --box-radius: 10px;
      --box-shadow: 0 10px 24px rgba(0, 0, 0, 0.045);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      color: var(--text-body);
    }

    .page-header {
      padding-top: 120px;
      padding-bottom: 20px;
    }

    .page-header p {
      max-width: 930px;
      margin: 0 0 28px 0;
      color: var(--text-body);
      font-size: 1.05rem;
      line-height: 1.75;
    }

    .section-title {
      color: var(--heading-main);
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      letter-spacing: 0.18em;
    }

    #blog-header .section-title {
      color: var(--accent-green);
    }

    .section-line {
      background: var(--accent-gold);
    }

    .eyebrow,
    .featured-card > span {
      color: var(--accent-green);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      line-height: 1;
    }

    .featured-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
      margin-top: 22px;
    }

    .featured-card {
      display: block;
      padding: 24px;
      border-radius: var(--box-radius);
      border: 1px solid var(--soft-border);
      background: var(--box-bg);
      box-shadow: var(--box-shadow);
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .featured-card:hover {
      transform: translateY(-3px);
      border-color: rgba(18, 63, 54, 0.22);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.07);
    }

    .featured-card > span {
      display: inline-block;
      color: var(--accent-gold);
      margin-bottom: 12px;
    }

    .featured-card h3 {
      margin: 0 0 12px 0;
      color: var(--heading-main);
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      font-size: 1.28rem;
      line-height: 1.25;
    }

    .featured-card p {
      margin: 0;
      color: var(--text-body);
      font-size: 1rem;
      line-height: 1.7;
    }

    .jump-note {
      display: inline-block;
      margin-top: 14px;
      color: var(--accent-green);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .media-controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 26px 0;
    }

    .control-btn {
      border: 1px solid rgba(18, 63, 54, 0.18);
      background: #ffffff;
      color: var(--accent-green);
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    .control-btn:hover,
    .control-btn.active {
      background: var(--accent-green);
      color: #ffffff;
      border-color: var(--accent-green);
    }

    .media-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    .media-group {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    .media-group-title {
      margin: 8px 0 -2px 0;
      color: var(--heading-main);
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      font-size: 1.18rem;
      line-height: 1.25;
    }

    .media-card {
      background: var(--box-bg);
      border: 1px solid var(--soft-border);
      border-radius: var(--box-radius);
      box-shadow: var(--box-shadow);
      padding: 24px;
      min-height: auto !important;
      height: auto !important;
      display: block !important;
      scroll-margin-top: 110px;
    }

    .media-card h3 {
      margin: 0 0 12px 0;
      color: var(--heading-main);
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      font-size: 1.28rem;
      line-height: 1.25;
    }

    .media-card p {
      margin: 0 0 12px 0;
      color: var(--text-body);
      font-size: 1rem;
      line-height: 1.7;
    }

    .media-card .summary {
      color: var(--text-muted);
      font-size: 0.96rem;
      line-height: 1.65;
      font-style: italic;
    }

    .post-author {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin: 0 0 12px 0;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .author-avatar-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      flex: 0 0 32px;
    }

    .author-avatar {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid #d6d6d6;
      background: #555555;
      box-sizing: border-box;
    }

    .author-avatar-img {
      display: block;
      object-fit: cover;
      object-position: center;
    }

    .author-avatar-fallback {
      display: inline-block;
      background: #555555;
    }

    .author-name {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .featured-card .post-author {
      margin-top: -2px;
      margin-bottom: 12px;
    }

    .featured-card .author-name {
      color: var(--text-muted);
    }

    .media-footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-top: 16px;
      margin-bottom: 0;
    }

    .media-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0;
    }

    .type-label {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: max-content;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
      border: 1px solid transparent;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.035);
    }

    .type-research-note {
      background: linear-gradient(180deg, rgba(18, 63, 54, 0.11), rgba(18, 63, 54, 0.06));
      color: var(--accent-green);
      border-color: rgba(18, 63, 54, 0.16);
    }

    .type-paper-summary {
      background: linear-gradient(180deg, rgba(181, 139, 71, 0.16), rgba(181, 139, 71, 0.08));
      color: #806026;
      border-color: rgba(181, 139, 71, 0.20);
    }

    .type-public-media {
      background: linear-gradient(180deg, rgba(120, 47, 64, 0.11), rgba(120, 47, 64, 0.06));
      color: var(--accent-garnet);
      border-color: rgba(120, 47, 64, 0.16);
    }

    .type-commentary {
      background: linear-gradient(180deg, rgba(74, 92, 97, 0.11), rgba(74, 92, 97, 0.06));
      color: var(--accent-slate);
      border-color: rgba(74, 92, 97, 0.16);
    }

    .media-links {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      width: auto;
    }

    .media-links:empty {
      display: none;
    }

    .media-links a {
      color: var(--accent-green);
      font-size: 0.92rem;
      font-weight: 700;
      text-decoration: none;
      line-height: 1;
    }

    .media-links a:hover {
      text-decoration: underline;
    }

    .area-tags {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px;
      margin-left: auto;
    }

    .area-tags:empty {
      display: none;
    }

    .area-tag {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: auto;
      height: auto;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      cursor: help;
    }

    .area-tag img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      opacity: 0.95;
      display: block;
    }

    .area-tag::after {
      content: attr(data-label);
      position: absolute;
      right: 0;
      bottom: calc(100% + 8px);
      background: var(--heading-main);
      color: #ffffff;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 0.78rem;
      line-height: 1.2;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(4px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 20;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
    }

    .area-tag:hover::after,
    .area-tag:focus::after {
      opacity: 1;
      transform: translateY(0);
    }

    .media-card > *:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 1100px) {
      .featured-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .media-card,
      .featured-card {
        padding: 22px;
      }

      .media-card h3,
      .featured-card h3 {
        font-size: 1.18rem;
      }

      .media-footer {
        align-items: flex-start;
        flex-direction: column;
      }

      .area-tags {
        margin-left: 0;
        justify-content: flex-start;
      }

      .area-tag::after {
        left: 0;
        right: auto;
      }
    }
  </style>
</head>

<main>

<section class="section block page-header" id="blog-header">
  <h1 class="section-title">Blog</h1>
