  <title>Blog Post | Sina Jangjoo</title>
  <meta name="description" content="Blog post by Sina Jangjoo on public administration, institutional change, AI governance, clean energy transitions, nonprofit action, and urban policy.">

  <link rel="icon" type="image/png" href="images/icon.png">
  <link rel="apple-touch-icon" href="images/icon.png">
  <link rel="stylesheet" href="style.css">

  <style>
    :root {
      --text-main: #222222;
      --text-body: #333333;
      --text-muted: #5A5A5A;
      --heading-main: #111111;

      --accent-green: #123f36;
      --accent-gold: #b58b47;
      --accent-garnet: #782F40;
      --accent-slate: #4A5C61;

      --box-bg: #ffffff;
      --soft-bg: #FAF8F4;
      --soft-border: rgba(0, 0, 0, 0.10);
      --box-radius: 10px;
      --box-shadow: 0 10px 24px rgba(0, 0, 0, 0.045);
    }

    body {
      color: var(--text-body);
    }

    .post-wrap {
      padding-top: 120px;
      padding-bottom: 70px;
    }

    .post-article {
      max-width: 930px;
      margin: 0 auto;
      background: var(--box-bg);
      border: 1px solid var(--soft-border);
      border-radius: var(--box-radius);
      box-shadow: var(--box-shadow);
      padding: 34px;
    }

    .post-article h1 {
      margin: 20px 0 14px 0;
      color: var(--heading-main);
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.16;
      letter-spacing: 0.005em;
      max-width: 100%;
    }

    .post-summary {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.7;
      font-style: italic;
      margin: 0 0 24px 0;
    }

    .post-meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }

    .post-body {
      margin-top: 30px;
      color: var(--text-body);
      font-size: 1.02rem;
      line-height: 1.8;
    }

    .post-body h2 {
      margin-top: 34px;
      margin-bottom: 10px;
      color: var(--heading-main);
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      font-size: 1.45rem;
      line-height: 1.25;
    }

    .post-body h2:first-child {
      margin-top: 0;
    }

    .post-body p {
      margin: 0 0 18px 0;
    }

    .post-body ul,
    .post-body ol {
      margin: 0 0 18px 22px;
      padding: 0;
      line-height: 1.8;
    }

    .post-body li {
      margin-bottom: 8px;
    }

    .post-body a {
      color: var(--accent-green);
      font-weight: 700;
      text-decoration: none;
    }

    .post-body a:hover {
      text-decoration: underline;
    }

    .type-label {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: max-content;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
      border: 1px solid transparent;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.035);
    }

    .type-research-note {
      background: linear-gradient(180deg, rgba(18, 63, 54, 0.11), rgba(18, 63, 54, 0.06));
      color: var(--accent-green);
      border-color: rgba(18, 63, 54, 0.16);
    }

    .type-paper-summary {
      background: linear-gradient(180deg, rgba(181, 139, 71, 0.16), rgba(181, 139, 71, 0.08));
      color: #806026;
      border-color: rgba(181, 139, 71, 0.20);
    }

    .type-public-media {
      background: linear-gradient(180deg, rgba(120, 47, 64, 0.11), rgba(120, 47, 64, 0.06));
      color: var(--accent-garnet);
      border-color: rgba(120, 47, 64, 0.16);
    }

    .type-commentary {
      background: linear-gradient(180deg, rgba(74, 92, 97, 0.11), rgba(74, 92, 97, 0.06));
      color: var(--accent-slate);
      border-color: rgba(74, 92, 97, 0.16);
    }

    .area-tags {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 0 0;
    }

    .area-tags:empty {
      display: none;
    }

    .area-tag {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: auto;
      height: auto;
      padding: 0;
      margin: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      cursor: help;
    }

    .area-tag img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      opacity: 0.95;
      display: block;
    }

    .area-tag::after {
      content: attr(data-label);
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      background: var(--heading-main);
      color: #ffffff;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 0.78rem;
      line-height: 1.2;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(4px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 20;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
    }

    .area-tag:hover::after,
    .area-tag:focus::after {
      opacity: 1;
      transform: translateY(0);
    }

    .post-divider {
      width: 60px;
      height: 2px;
      background: var(--accent-gold);
      margin: 24px 0;
    }

    .post-not-found {
      max-width: 760px;
      margin: 0 auto;
    }

    @media (max-width: 900px) {
      .post-wrap {
        padding-top: 110px;
      }

      .post-article {
        padding: 28px;
      }

      .post-article h1 {
        font-size: 2rem;
      }
    }

    @media (max-width: 760px) {
      .post-wrap {
        padding-top: 70px;
      }

      .post-article {
        padding: 24px;
      }

      .post-body {
        font-size: 1rem;
      }

      .area-tag::after {
        left: 0;
        right: auto;
      }
    }
  </style>
</head>
